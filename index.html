<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Retro Stickman Joystick Fighter</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a12;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            max-width: 480px;
            max-height: 920px;
            background: #141424;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
            z-index: 10;
            background: radial-gradient(circle at center, #1a1a30 0%, #0d0d18 100%);
        }
        .hidden { display: none !important; }

        h1 {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(45deg, #00f0ff, #ff3e6c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
        }

        .subtitle-text {
            color: #79799c;
            font-size: 14px;
            margin-bottom: 40px;
            text-align: center;
        }

        .char-grid {
            display: flex;
            gap: 20px;
            width: 100%;
            justify-content: center;
            margin-bottom: 40px;
        }
        .char-card {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 24px 16px;
            border-radius: 16px;
            cursor: pointer;
            width: 150px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        #card-dharmik.selected {
            border-color: #00f0ff;
            background: rgba(0, 240, 255, 0.08);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.3);
            transform: translateY(-5px);
        }
        #card-avisha.selected {
            border-color: #ff3e6c;
            background: rgba(255, 62, 108, 0.08);
            box-shadow: 0 0 25px rgba(255, 62, 108, 0.3);
            transform: translateY(-5px);
        }
        
        .char-avatar {
            font-size: 56px;
            margin-bottom: 12px;
        }
        .char-name {
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 0.5px;
        }
        .char-subtitle {
            font-size: 12px;
            color: #6a6a8a;
            margin-top: 4px;
        }
        
        .menu-btn {
            background: linear-gradient(90deg, #ff3e6c, #e43f5a);
            color: #fff;
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(228, 63, 90, 0.3);
        }
        .menu-btn:disabled {
            background: #252538;
            color: #55556b;
            box-shadow: none;
            cursor: not-allowed;
        }
        #status-message {
            margin-top: 20px;
            font-size: 13px;
            color: #00f0ff;
            min-height: 20px;
            font-family: monospace;
        }

        #battle-screen {
            background: #05050a;
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            padding: 0;
        }

        #canvas-wrapper {
            position: relative;
            width: 100%;
            flex: 1;
            background: #090910;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .hud {
            position: absolute;
            top: 25px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 5;
        }
        .health-bar-container {
            width: 44%;
            background: rgba(255, 255, 255, 0.1);
            height: 14px;
            border-radius: 7px;
            position: relative;
        }
        .health-fill {
            height: 100%;
            width: 100%;
            border-radius: 7px;
            transition: width 0.15s ease-out;
        }
        #p1-health {
            background: linear-gradient(90deg, #00bfff, #00f0ff);
        }
        #p2-health {
            background: linear-gradient(90deg, #ff3e6c, #ff7697);
        }
        .hud-name {
            position: absolute;
            top: -20px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        #hud-p1-name { left: 4px; color: #00f0ff; }
        #hud-p2-name { right: 4px; color: #ff3e6c; }

        #gameover-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 18, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            padding: 30px;
        }
        .outcome-title {
            font-size: 40px;
            font-weight: 900;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        .outcome-win { color: #00f0ff; text-shadow: 0 0 20px rgba(0, 240, 255, 0.4); }
        .outcome-defeat { color: #ff3e6c; text-shadow: 0 0 20px rgba(255, 62, 108, 0.4); }
        .ready-status {
            font-size: 14px;
            color: #79799c;
            margin-top: 15px;
            font-family: monospace;
        }

        #controller-overlay {
            width: 100%;
            height: 260px;
            background: #181826;
            border-top: 2px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            padding-bottom: env(safe-area-inset-bottom, 15px);
        }

        .joystick-container {
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.03);
            border: 4px solid #252538;
            border-radius: 50%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
        }
        .joystick-knob {
            width: 50px;
            height: 50px;
            background: linear-gradient(145deg, #3a3a54, #212133);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            position: absolute;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            transition: transform 0.05s linear;
        }

        .action-cluster {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .action-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            color: white;
            font-weight: 800;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }
        
        .punch-btn {
            background: linear-gradient(145deg, #2b2b40, #1e1e2d);
            border: 2px solid #00f0ff;
        }
        .punch-btn:active {
            background: #00f0ff;
            color: #111;
        }
        
        .kick-btn {
            background: linear-gradient(145deg, #2b2b40, #1e1e2d);
            border: 2px solid #ff3e6c;
        }
        .kick-btn:active {
            background: #ff3e6c;
            color: #111;
        }

        .shoot-btn {
            background: linear-gradient(145deg, #3b3b5c, #25253b);
            border: 2px solid #e2b020;
            width: 64px;
            height: 64px;
        }
        .shoot-btn:active {
            background: #e2b020;
            color: #111;
        }
    </style>
</head>
<body>

<div id="game-container">

    <div id="lobby-screen" class="screen">
        <h1>TEKKEN RETRO 2D</h1>
        <div class="subtitle-text">Stickman Joystick Edition</div>
        
        <div class="char-grid">
            <div class="char-card" id="card-dharmik" onclick="selectProfile('dharmik')">
                <div class="char-avatar">🥷</div>
                <div class="char-name">Dharmik</div>
                <div class="char-subtitle">Neon Stickman</div>
            </div>
            <div class="char-card" id="card-avisha" onclick="selectProfile('avisha')">
                <div class="char-avatar">👩‍🎤</div>
                <div class="char-name">Avisha</div>
                <div class="char-subtitle">Crimson Fighter</div>
            </div>
        </div>

        <button class="menu-btn" id="start-match-btn" onclick="lockSelection()">LOCK IN SELECTION</button>
        <div id="status-message">Awaiting cloud connection room setup...</div>
    </div>

    <div id="battle-screen" class="screen hidden">
        <div id="canvas-wrapper">
            <div class="hud">
                <div class="health-bar-container">
                    <div id="hud-p1-name" class="hud-name">Dharmik</div>
                    <div id="p1-health" class="health-fill"></div>
                </div>
                <div class="health-bar-container">
                    <div id="hud-p2-name" class="hud-name">Avisha</div>
                    <div id="p2-health" class="health-fill" style="float: right;"></div>
                </div>
            </div>

            <div id="gameover-overlay" class="hidden">
                <div id="outcome-text" class="outcome-title">WIN</div>
                <button class="menu-btn" id="play-again-btn" onclick="triggerPlayAgain()">PLAY AGAIN</button>
                <div id="ready-status-text" class="ready-status">Waiting for other player...</div>
            </div>

            <canvas id="gameCanvas"></canvas>
        </div>

        <div id="controller-overlay">
            <div class="joystick-container" id="joyContainer">
                <div class="joystick-knob" id="joyKnob"></div>
            </div>

            <div class="action-cluster">
                <div class="action-btn punch-btn" id="ctrl-punch" data-key="Punch">P</div>
                <div class="action-btn kick-btn" id="ctrl-kick" data-key="Kick">K</div>
                <div class="action-btn shoot-btn" id="ctrl-shoot" data-key="Shoot">S</div>
            </div>
        </div>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAIKXMt1f9qWkqsjueJREC11Tq9bEJxwOQ",
      authDomain: "tekken-backup.firebaseapp.com",
      databaseURL: "https://tekken-backup-default-rtdb.firebaseio.com",
      projectId: "tekken-backup",
      storageBucket: "tekken-backup.firebasestorage.app",
      messagingSenderId: "974619020042",
      appId: "1:974619020042:web:c813a659881456df1608f3",
      measurementId: "G-WTG014F872"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const sessionRoomPath = doc(db, "gameRooms", "global-fight-match");

    let clientIdentity = null;
    let synchronizedLobbyState = {};
    let localVisualDamageTicker = { dharmik: 0, avisha: 0 };
    
    let renderPositionsX = { dharmik: 80, avisha: 260 };
    let renderPositionsY = { dharmik: 0, avisha: 0 };
    let renderVelocitiesY = { dharmik: 0, avisha: 0 };
    let localActionStates = { dharmik: 'idle', avisha: 'idle' };
    
    // Adjusted for a much slower, floatier, and higher upward jump
    const gravity = 0.22;
    const movementSpeed = 2.5; 
    const jumpForce = -9.5;
    let hasJumpedThisInput = false;

    let activeProjectiles = [];

    window.selectProfile = function(profileKey) {
        document.getElementById("card-dharmik").classList.remove("selected");
        document.getElementById("card-avisha").classList.remove("selected");
        document.getElementById(`card-${profileKey}`).classList.add("selected");
        clientIdentity = profileKey;
    }

    window.lockSelection = async function() {
        if (!clientIdentity) {
            document.getElementById("status-message").innerText = "Choose your character slot first!";
            return;
        }
        document.getElementById("status-message").innerText = "Linked! Waiting for player 2...";
        
        renderPositionsX = { dharmik: 80, avisha: 260 };
        renderPositionsY = { dharmik: 0, avisha: 0 };
        
        const packagePayload = {};
        packagePayload[clientIdentity] = {
            selected: true,
            health: 100,
            posX: renderPositionsX[clientIdentity],
            posY: 0,
            actionState: 'idle',
            lastUpdated: Date.now()
        };
        packagePayload[`ready_${clientIdentity}`] = false; 
        packagePayload["rematchPending"] = false;

        await setDoc(sessionRoomPath, packagePayload, { merge: true });
    }

    window.triggerPlayAgain = async function() {
        if (!clientIdentity) return;
        document.getElementById("play-again-btn").disabled = true;
        
        const readyUpdate = {};
        readyUpdate[`ready_${clientIdentity}`] = true;
        readyUpdate["rematchPending"] = true;
        await updateDoc(sessionRoomPath, readyUpdate);
    }

    function resetLocalUIAndLobby() {
        document.getElementById("gameover-overlay").classList.add("hidden");
        document.getElementById("play-again-btn").disabled = false;
        document.getElementById("battle-screen").classList.add("hidden");
        document.getElementById("lobby-screen").classList.remove("hidden");
        document.getElementById("status-message").innerText = "Choose character to start a fresh battle!";
        document.getElementById("card-dharmik").classList.remove("selected");
        document.getElementById("card-avisha").classList.remove("selected");
        
        clientIdentity = null;
        synchronizedLobbyState = {};
        renderPositionsY = { dharmik: 0, avisha: 0 };
        renderVelocitiesY = { dharmik: 0, avisha: 0 };
        renderPositionsX = { dharmik: 80, avisha: 260 };
        hasJumpedThisInput = false;
        activeProjectiles = [];
    }

    onSnapshot(sessionRoomPath, async (snapshot) => {
        if (!snapshot.exists()) return;
        
        const newIncomingState = snapshot.data();
        
        ['dharmik', 'avisha'].forEach(key => {
            if (synchronizedLobbyState[key] && newIncomingState[key] && newIncomingState[key].health < synchronizedLobbyState[key].health) {
                localVisualDamageTicker[key] = 8;
            }
            
            if (key !== clientIdentity && newIncomingState[key]) {
                renderPositionsX[key] = newIncomingState[key].posX;
                localActionStates[key] = newIncomingState[key].actionState;
                
                if (newIncomingState[key].actionState === 'jumping' && renderPositionsY[key] === 0) {
                    renderVelocitiesY[key] = jumpForce;
                }

                if (newIncomingState[key].actionState === 'shooting') {
                    if (!synchronizedLobbyState[key] || synchronizedLobbyState[key].actionState !== 'shooting') {
                        spawnProjectile(key, newIncomingState[key].posX, renderPositionsY[key]);
                    }
                }
            }
        });

        synchronizedLobbyState = newIncomingState;
        
        const dharmikHealth = synchronizedLobbyState.dharmik?.health ?? 100;
        const avishaHealth = synchronizedLobbyState.avisha?.health ?? 100;

        if (synchronizedLobbyState.dharmik?.selected === false && synchronizedLobbyState.avisha?.selected === false && !synchronizedLobbyState.rematchPending && clientIdentity) {
            resetLocalUIAndLobby();
            return;
        }

        if ((synchronizedLobbyState.dharmik?.selected && dharmikHealth <= 0) || 
            (synchronizedLobbyState.avisha?.selected && avishaHealth <= 0) || 
            synchronizedLobbyState.rematchPending) {
            
            const overlay = document.getElementById("gameover-overlay");
            const text = document.getElementById("outcome-text");
            overlay.classList.remove("hidden");

            if (clientIdentity) {
                const myHealth = synchronizedLobbyState[clientIdentity]?.health ?? 100;
                if (myHealth <= 0) {
                    text.innerText = "DEFEAT";
                    text.className = "outcome-title outcome-defeat";
                } else {
                    text.innerText = "WINNER";
                    text.className = "outcome-title outcome-win";
                }
            }

            const p1Ready = synchronizedLobbyState.ready_dharmik || false;
            const p2Ready = synchronizedLobbyState.ready_avisha || false;
            
            let count = 0;
            if (p1Ready) count++;
            if (p2Ready) count++;
            document.getElementById("ready-status-text").innerText = `Ready Check: (${count}/2)`;

            if (p1Ready && p2Ready) {
                await setDoc(sessionRoomPath, {
                    dharmik: { selected: false, health: 100, posX: 80, posY: 0, actionState: 'idle' },
                    avisha: { selected: false, health: 100, posX: 260, posY: 0, actionState: 'idle' },
                    ready_dharmik: false,
                    ready_avisha: false,
                    rematchPending: false
                });
            }
        } else {
            document.getElementById("gameover-overlay").classList.add("hidden");
        }
        
        if (synchronizedLobbyState.dharmik?.selected && synchronizedLobbyState.avisha?.selected && !synchronizedLobbyState.rematchPending) {
            if (document.getElementById("battle-screen").classList.contains("hidden")) {
                transitionToCombatLoop();
            }
        }
    });

    function transitionToCombatLoop() {
        document.getElementById("lobby-screen").classList.add("hidden");
        document.getElementById("battle-screen").classList.remove("hidden");
        initCombatGraphicsEngine();
    }

    function spawnProjectile(owner, startX, startY) {
        const direction = owner === 'dharmik' ? 1 : -1;
        activeProjectiles.push({
            owner: owner,
            x: startX + (30 * direction),
            y: startY,
            speed: 5 * direction, 
            type: owner === 'dharmik' ? 'water' : 'fire',
            active: true
        });
    }

    function initCombatGraphicsEngine() {
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        function resizeGameWindow() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        resizeGameWindow();
        window.addEventListener('resize', resizeGameWindow);

        const groundLevel = canvas.height - 40;

        const entities = {
            dharmik: { color: "#00f0ff" },
            avisha: { color: "#ff3e6c" }
        };

        const joyContainer = document.getElementById("joyContainer");
        const joyKnob = document.getElementById("ctrl-punch"); // fallback element target or dynamic rect finder
        let joystickActive = false;
        let joyXOffset = 0;
        let joyYOffset = 0;

        function updateJoystickPosition(touchX, touchY) {
            const containerRect = joyContainer.getBoundingClientRect();
            const centerX = containerRect.left + containerRect.width / 2;
            const centerY = containerRect.top + containerRect.height / 2;
            
            let deltaX = touchX - centerX;
            let deltaY = touchY - centerY;
            
            const maxRadius = 35;
            const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
            
            if (distance > maxRadius) {
                deltaX = (deltaX / distance) * maxRadius;
                deltaY = (deltaY / distance) * maxRadius;
            }

            document.getElementById("joyKnob").style.transform = `translate(${deltaX}px, ${deltaY}px)`;
            joyXOffset = deltaX / maxRadius;
            joyYOffset = deltaY / maxRadius;
        }

        function resetJoystick() {
            joystickActive = false;
            joyXOffset = 0;
            joyYOffset = 0;
            document.getElementById("joyKnob").style.transform = 'translate(0px, 0px)';
            if (clientIdentity && synchronizedLobbyState[clientIdentity]?.health > 0) {
                if (localActionStates[clientIdentity] !== 'jumping') {
                    localActionStates[clientIdentity] = 'idle';
                }
                sendCloudStatePatch();
            }
        }

        joyContainer.addEventListener("touchstart", (e) => {
            if(synchronizedLobbyState.rematchPending) return;
            joystickActive = true;
            updateJoystickPosition(e.touches[0].clientX, e.touches[0].clientY);
        });
        window.addEventListener("touchmove", (e) => {
            if (!joystickActive || synchronizedLobbyState.rematchPending) return;
            updateJoystickPosition(e.touches[0].clientX, e.touches[0].clientY);
        });
        window.addEventListener("touchend", resetJoystick);

        joyContainer.addEventListener("mousedown", (e) => {
            if(synchronizedLobbyState.rematchPending) return;
            joystickActive = true;
            updateJoystickPosition(e.clientX, e.clientY);
        });
        window.addEventListener("mousemove", (e) => {
            if (!joystickActive || synchronizedLobbyState.rematchPending) return;
            updateJoystickPosition(e.clientX, e.clientY);
        });
        window.addEventListener("mouseup", resetJoystick);

        setInterval(() => {
            if (!clientIdentity || synchronizedLobbyState.rematchPending) return;
            const currentActorData = synchronizedLobbyState[clientIdentity];
            if (!currentActorData || currentActorData.health <= 0) return;

            if (localActionStates[clientIdentity] === 'shooting') return;

            // Trigger only a single jump when pulled upwards
            if (joyYOffset < -0.5) {
                if (renderPositionsY[clientIdentity] === 0 && !hasJumpedThisInput) {
                    renderVelocitiesY[clientIdentity] = jumpForce; 
                    localActionStates[clientIdentity] = 'jumping';
                    hasJumpedThisInput = true;
                }
            } else {
                // Reset flag when joystick is returned below the jump threshold
                hasJumpedThisInput = false;
            }

            renderPositionsX[clientIdentity] += (joyXOffset * movementSpeed);
            renderPositionsX[clientIdentity] = Math.max(20, Math.min(canvas.width - 40, renderPositionsX[clientIdentity]));

            if (renderPositionsY[clientIdentity] < 0) {
                localActionStates[clientIdentity] = 'jumping';
            } else if (joystickActive && localActionStates[clientIdentity] !== 'jumping') {
                localActionStates[clientIdentity] = 'walking';
            } else if (!joystickActive && localActionStates[clientIdentity] !== 'jumping') {
                localActionStates[clientIdentity] = 'idle';
            }

            sendCloudStatePatch();
        }, 1000 / 60);

        let lastCloudUpdate = 0;
        function sendCloudStatePatch() {
            const now = Date.now();
            if (now - lastCloudUpdate < 45) return; 
            lastCloudUpdate = now;

            const inputStatePatch = {};
            inputStatePatch[`${clientIdentity}.posX`] = renderPositionsX[clientIdentity];
            inputStatePatch[`${clientIdentity}.posY`] = renderPositionsY[clientIdentity];
            inputStatePatch[`${clientIdentity}.actionState`] = localActionStates[clientIdentity];
            inputStatePatch[`${clientIdentity}.lastUpdated`] = now;
            
            updateDoc(sessionRoomPath, inputStatePatch);
        }

        function triggerActionState(actionState) {
            if (!clientIdentity || synchronizedLobbyState.rematchPending) return;
            const currentActorData = synchronizedLobbyState[clientIdentity];
            if (!currentActorData || currentActorData.health <= 0) return;

            localActionStates[clientIdentity] = actionState;
            
            const inputStatePatch = {};
            inputStatePatch[`${clientIdentity}.actionState`] = actionState;
            inputStatePatch[`${clientIdentity}.lastUpdated`] = Date.now();
            updateDoc(sessionRoomPath, inputStatePatch);
            
            if (actionState === 'punching' || actionState === 'kicking') {
                evaluateStrikeHitbox();
            } else if (actionState === 'shooting') {
                spawnProjectile(clientIdentity, renderPositionsX[clientIdentity], renderPositionsY[clientIdentity]);
            }
        }

        function evaluateStrikeHitbox() {
            const opposingTargetKey = clientIdentity === 'dharmik' ? 'avisha' : 'dharmik';
            const target = synchronizedLobbyState[opposingTargetKey];

            if (!target || target.health <= 0) return;

            const verticalTargetDiff = Math.abs(renderPositionsY[clientIdentity] - renderPositionsY[opposingTargetKey]);
            if (Math.abs(renderPositionsX[clientIdentity] - renderPositionsX[opposingTargetKey]) < 75 && verticalTargetDiff < 50) {
                const targetNewHealth = Math.max(0, target.health - 7);
                const matchDamageUpdate = {};
                matchDamageUpdate[`${opposingTargetKey}.health`] = targetNewHealth;
                updateDoc(sessionRoomPath, matchDamageUpdate);
            }
        }

        ['ctrl-punch', 'ctrl-kick', 'ctrl-shoot'].forEach(elemId => {
            const btnTarget = document.getElementById(elemId);
            const actionKey = btnTarget.getAttribute("data-key");

            btnTarget.addEventListener("touchstart", (e) => { 
                e.preventDefault(); 
                triggerActionState(actionKey === 'Punch' ? 'punching' : (actionKey === 'Kick' ? 'kicking' : 'shooting')); 
            });
            btnTarget.addEventListener("touchend", (e) => { 
                e.preventDefault(); 
                triggerActionState('idle'); 
            });
            btnTarget.addEventListener("mousedown", () => {
                triggerActionState(actionKey === 'Punch' ? 'punching' : (actionKey === 'Kick' ? 'kicking' : 'shooting'));
            });
            btnTarget.addEventListener("mouseup", () => triggerActionState('idle'));
        });

        function runLocalRenderLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ['dharmik', 'avisha'].forEach(key => {
                if (renderPositionsY[key] < 0 || renderVelocitiesY[key] !== 0) {
                    renderVelocitiesY[key] += gravity;
                    renderPositionsY[key] += renderVelocitiesY[key];
                    
                    if (renderPositionsY[key] >= 0) {
                        renderPositionsY[key] = 0;
                        renderVelocitiesY[key] = 0;
                        if (localActionStates[key] === 'jumping') {
                            localActionStates[key] = 'idle';
                        }
                    }
                }
            });

            let backgroundGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            if (localVisualDamageTicker.dharmik > 0 || localVisualDamageTicker.avisha > 0) {
                backgroundGradient.addColorStop(0, '#3a1520');
                backgroundGradient.addColorStop(1, '#0d0d18');
            } else {
                backgroundGradient.addColorStop(0, '#141428');
                backgroundGradient.addColorStop(1, '#080811');
            }
            ctx.fillStyle = backgroundGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#22223b";
            ctx.fillRect(0, groundLevel, canvas.width, canvas.height - groundLevel);

            activeProjectiles.forEach((proj) => {
                if (!proj.active) return;

                proj.x += proj.speed;

                if (proj.x < 0 || proj.x > canvas.width) {
                    proj.active = false;
                    return;
                }

                ctx.beginPath();
                if (proj.type === 'water') {
                    let grad = ctx.createRadialGradient(proj.x, groundLevel - 62 + proj.y, 2, proj.x, groundLevel - 62 + proj.y, 10);
                    grad.addColorStop(0, '#ffffff');
                    grad.addColorStop(0.4, '#00bfff');
                    grad.addColorStop(1, 'rgba(0, 240, 255, 0)');
                    ctx.fillStyle = grad;
                    ctx.arc(proj.x, groundLevel - 62 + proj.y, 10, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    let grad = ctx.createRadialGradient(proj.x, groundLevel - 62 + proj.y, 2, proj.x, groundLevel - 62 + proj.y, 10);
                    grad.addColorStop(0, '#ffff00');
                    grad.addColorStop(0.4, '#ff3e6c');
                    grad.addColorStop(1, 'rgba(255, 62, 108, 0)');
                    ctx.fillStyle = grad;
                    ctx.arc(proj.x, groundLevel - 62 + proj.y, 10, 0, Math.PI * 2);
                    ctx.fill();
                }

                if (proj.owner === clientIdentity) {
                    const targetKey = clientIdentity === 'dharmik' ? 'avisha' : 'dharmik';
                    
                    if (synchronizedLobbyState[targetKey] && synchronizedLobbyState[targetKey].health > 0) {
                        const targetY = renderPositionsY[targetKey];
                        const horizontalDist = Math.abs(proj.x - renderPositionsX[targetKey]);
                        const verticalDist = Math.abs(proj.y - targetY);

                        if (horizontalDist < 35 && verticalDist < 50) {
                            proj.active = false; 
                            
                            const nextHealthValue = Math.max(0, synchronizedLobbyState[targetKey].health - 12); 
                            const stateDamagePatch = {};
                            stateDamagePatch[`${targetKey}.health`] = nextHealthValue;
                            updateDoc(sessionRoomPath, stateDamagePatch);
                        }
                    }
                }
            });

            activeProjectiles = activeProjectiles.filter(p => p.active);

            ['dharmik', 'avisha'].forEach(playerKey => {
                const liveData = synchronizedLobbyState[playerKey];
                const layout = entities[playerKey];

                const playerHealth = (liveData && typeof liveData.health !== 'undefined') ? liveData.health : 100;
                const playerX = renderPositionsX[playerKey];
                const playerY = renderPositionsY[playerKey]; 
                const playerAction = localActionStates[playerKey];

                const targetHud = document.getElementById(`${playerKey === 'dharmik' ? 'p1' : 'p2'}-health`);
                if (targetHud) targetHud.style.width = `${playerHealth}%`;

                const baseHeadX = playerX;
                const baseHeadY = groundLevel - 80 + playerY;

                ctx.lineWidth = 5;
                ctx.lineCap = "round";

                if (localVisualDamageTicker[playerKey] > 0) {
                    ctx.strokeStyle = "#ffffff";
                    localVisualDamageTicker[playerKey]--;
                } else {
                    ctx.strokeStyle = layout.color;
                }

                if (playerHealth <= 0) {
                    ctx.beginPath();
                    ctx.arc(baseHeadX, groundLevel - 15, 10, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(baseHeadX - 10, groundLevel - 5);
                    ctx.lineTo(baseHeadX + 15, groundLevel - 5);
                    ctx.stroke();
                    return;
                }

                ctx.beginPath();
                ctx.arc(baseHeadX, baseHeadY, 12, 0, Math.PI * 2);
                ctx.stroke();

                const spineBottomY = baseHeadY + 35;
                ctx.beginPath();
                ctx.moveTo(baseHeadX, baseHeadY + 12);
                ctx.lineTo(baseHeadX, spineBottomY);
                ctx.stroke();

                const directionMultiplier = playerKey === 'dharmik' ? 1 : -1;

                ctx.beginPath();
                if (playerAction === 'punching') {
                    ctx.moveTo(baseHeadX, baseHeadY + 18);
                    ctx.lineTo(baseHeadX + (28 * directionMultiplier), baseHeadY + 18);
                } else if (playerAction === 'shooting') {
                    ctx.moveTo(baseHeadX, baseHeadY + 18);
                    ctx.lineTo(baseHeadX + (30 * directionMultiplier), baseHeadY + 14);
                } else {
                    ctx.moveTo(baseHeadX, baseHeadY + 18);
                    ctx.lineTo(baseHeadX + (12 * directionMultiplier), baseHeadY + 28);
                }
                ctx.stroke();

                ctx.beginPath();
                if (playerAction === 'kicking') {
                    ctx.moveTo(baseHeadX, spineBottomY);
                    ctx.lineTo(baseHeadX + (30 * directionMultiplier), spineBottomY - 15);
                    ctx.moveTo(baseHeadX, spineBottomY);
                    ctx.lineTo(baseHeadX - (5 * directionMultiplier), groundLevel + playerY);
                } else {
                    ctx.moveTo(baseHeadX, spineBottomY);
                    ctx.lineTo(baseHeadX - 10, groundLevel + playerY);
                    ctx.moveTo(baseHeadX, spineBottomY);
                    ctx.lineTo(baseHeadX + 10, groundLevel + playerY);
                }
                ctx.stroke();
            });

            requestAnimationFrame(runLocalRenderLoop);
        }
        requestAnimationFrame(runLocalRenderLoop);
    }
</script>
